{% if messages %}
<div class="fixed top-20 right-4 z-50 flex flex-col gap-2 max-w-sm w-full" id="alert-container">
    {% for message in messages %}
    <div class="alert-toast flex items-start gap-3 px-5 py-4 rounded-xl shadow-lg border backdrop-blur-sm
        {% if message.tags == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-800
        {% elif message.tags == 'error' %}bg-rose-50 border-rose-200 text-rose-800
        {% elif message.tags == 'warning' %}bg-amber-50 border-amber-200 text-amber-800
        {% else %}bg-stone-50 border-stone-200 text-stone-800{% endif %}"
        role="alert">
        <span class="flex-shrink-0 mt-0.5">
            {% if message.tags == 'success' %}
            <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            {% elif message.tags == 'error' %}
            <svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            {% elif message.tags == 'warning' %}
            <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
            </svg>
            {% else %}
            <svg class="w-5 h-5 text-stone-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            {% endif %}
        </span>
        <p class="text-sm font-medium flex-1">{{ message }}</p>
        <button onclick="this.parentElement.remove()" class="flex-shrink-0 text-stone-400 hover:text-stone-600 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>
    {% endfor %}
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.alert-toast').forEach(function(el) {
        setTimeout(function() {
            el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
            el.style.opacity = '0';
            el.style.transform = 'translateX(100%)';
            setTimeout(function() { el.remove(); }, 300);
        }, 4000);
    });
});
</script>
{% endif %}
