<div class="text-center py-16 px-6">
    <div class="w-20 h-20 rounded-full bg-stone-100 flex items-center justify-center mx-auto mb-6">
        <svg class="w-10 h-10 text-stone-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="{{ icon_path }}"></path>
        </svg>
    </div>
    <h3 class="text-xl font-serif font-bold text-stone-800 mb-2">{{ title }}</h3>
    <p class="text-stone-500 mb-8 max-w-md mx-auto">{{ subtitle }}</p>
    {% if cta_url and cta_text %}
    <a href="{{ cta_url }}"
        class="inline-flex items-center gap-2 bg-stone-900 hover:bg-stone-800 text-white font-medium px-6 py-3 rounded-xl transition-all duration-300 shadow-sm hover:shadow-md">
        {{ cta_text }}
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
        </svg>
    </a>
    {% endif %}
</div>
