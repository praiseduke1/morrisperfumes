{% extends "admin/change_list.html" %}
{% load i18n static %}

{% block object-tools-items %}
<div class="btn-group me-2">
    <a href="{% url 'admin:orders_order_changelist' %}?status__exact=pending_payment" class="btn btn-sm btn-warning">
        Pending Payment
    </a>
    <a href="{% url 'admin:orders_order_changelist' %}?status__exact=processing" class="btn btn-sm btn-primary">
        Processing
    </a>
    <a href="{% url 'admin:orders_order_changelist' %}?status__exact=shipped" class="btn btn-sm btn-dark">
        Shipped
    </a>
    <a href="{% url 'admin:orders_order_changelist' %}?status__exact=delivered" class="btn btn-sm btn-success">
        Delivered
    </a>
    <a href="{% url 'admin:orders_order_changelist' %}?status__exact=cancelled" class="btn btn-sm btn-danger">
        Cancelled
    </a>
</div>
{{ block.super }}
{% endblock %}
